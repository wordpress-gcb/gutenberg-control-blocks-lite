name: Release

# Triggered when a tag named like v0.1.0 / v1.2.3-beta is pushed:
#   git tag v0.1.0
#   git push origin v0.1.0
#
# Result: a GitHub Release at /releases/tag/v0.1.0 with the built zip
# attached as an asset. Users download from /releases instead of having
# to clone the repo + run composer/npm.
#
# Also triggerable manually from the Actions tab for testing.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (for manual runs; ignored for tag-push triggers)'
        required: false
        default: 'v0.0.0-manual'

permissions:
  contents: write   # required to create the Release + attach assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm deps
        run: npm ci

      - name: Build (composer + npm + zip via build-release.sh)
        run: bash build-release.sh

      - name: Resolve tag name
        id: tag
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Locate built zip
        id: zip
        run: |
          ZIP=$(ls dist/gcb-lite-*.zip | head -n1)
          if [ -z "$ZIP" ] || [ ! -f "$ZIP" ]; then
            echo "No built zip found in dist/" >&2
            exit 1
          fi
          echo "path=$ZIP" >> "$GITHUB_OUTPUT"
          echo "name=$(basename $ZIP)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and attach zip
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          # Auto-generate release notes from commits since the previous tag.
          # First release will just say "initial release" or list every commit;
          # subsequent ones will be a clean changelog of what's new.
          generate_release_notes: true
          # Mark anything matching v*-{alpha,beta,rc,dev} as a prerelease.
          # 0.1.0 (no suffix) is a regular release; v0.2.0-beta would be a prerelease.
          prerelease: ${{ contains(steps.tag.outputs.name, '-') }}
          files: ${{ steps.zip.outputs.path }}
          fail_on_unmatched_files: true

      # ----------------------------------------------------------------
      # Demo-site deploy. Only runs if KINSTA_SSH_HOST is set as a repo
      # secret — that's the opt-in. Other forks of this plugin won't
      # accidentally try to deploy somewhere.
      #
      # GitHub Actions doesn't allow `secrets.X` directly in an `if:`
      # expression, so we map the secret into a step-level env var first
      # (the "probe" step), then gate this step on that env var.
      #
      # This is appropriate for the DEMO Kinsta site (one shared install
      # the maintainers control). Don't reuse this pattern on a real
      # production WP site without a manual approval gate.
      # ----------------------------------------------------------------
      - name: Probe whether Kinsta deploy secrets are set
        id: kinsta_probe
        env:
          KINSTA_SSH_HOST: ${{ secrets.KINSTA_SSH_HOST }}
        run: |
          if [ -n "$KINSTA_SSH_HOST" ]; then
            echo "configured=true"  >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy zip to demo Kinsta (skipped if secret unset)
        if: steps.kinsta_probe.outputs.configured == 'true'
        env:
          KINSTA_SSH_PRIVATE_KEY: ${{ secrets.KINSTA_SSH_PRIVATE_KEY }}
          KINSTA_SSH_HOST:        ${{ secrets.KINSTA_SSH_HOST }}
          KINSTA_SSH_PORT:        ${{ secrets.KINSTA_SSH_PORT }}
          KINSTA_SSH_USER:        ${{ secrets.KINSTA_SSH_USER }}
          # Absolute path on the Kinsta box, e.g.
          # /www/wordpressgcb_912/public/wp-content/plugins/gcb-lite
          KINSTA_REMOTE_PLUGIN_PATH: ${{ secrets.KINSTA_REMOTE_PLUGIN_PATH }}
          ZIP_PATH: ${{ steps.zip.outputs.path }}
          ZIP_NAME: ${{ steps.zip.outputs.name }}
        run: |
          # Set up SSH.
          mkdir -p ~/.ssh
          echo "$KINSTA_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$KINSTA_SSH_PORT" -H "$KINSTA_SSH_HOST" >> ~/.ssh/known_hosts

          # Upload the zip to a staging path.
          REMOTE_STAGE="/tmp/${ZIP_NAME}"
          REMOTE_EXTRACT_PARENT="$(dirname "$KINSTA_REMOTE_PLUGIN_PATH")"

          scp -P "$KINSTA_SSH_PORT" -i ~/.ssh/id_ed25519 \
            "$ZIP_PATH" \
            "$KINSTA_SSH_USER@$KINSTA_SSH_HOST:$REMOTE_STAGE"

          # Atomic-ish swap: extract the new zip alongside the live folder,
          # rename the old one out of the way, move the new one in, delete
          # the old one. The whole thing takes ~100ms so the window where
          # the plugin's missing from disk is tiny — far smaller than the
          # equivalent rsync --delete window.
          ssh -p "$KINSTA_SSH_PORT" -i ~/.ssh/id_ed25519 \
            "$KINSTA_SSH_USER@$KINSTA_SSH_HOST" "bash -s" <<EOF
          set -euo pipefail
          cd "$REMOTE_EXTRACT_PARENT"
          # Extract into a temp name. The zip contains a top-level
          # gcb-lite-0.1.0/ folder; we extract then rename.
          rm -rf gcb-lite.new
          unzip -q "$REMOTE_STAGE" -d .extract.\$\$
          mv .extract.\$\$/gcb-lite-* gcb-lite.new
          rmdir .extract.\$\$
          # Atomic swap.
          rm -rf gcb-lite.old
          if [ -d gcb-lite ]; then mv gcb-lite gcb-lite.old; fi
          mv gcb-lite.new gcb-lite
          rm -rf gcb-lite.old
          rm -f "$REMOTE_STAGE"
          echo "Deployed gcb-lite to \$(pwd)/gcb-lite"
          EOF
